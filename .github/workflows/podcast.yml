name: Podcast Economía y Mercado

on:
  schedule:
    # Lunes 09:30 UTC = 06:30 de Montevideo (UTC-3).
    # Ojo: los crons de GitHub pueden demorar hasta ~30 min, como ya viste con Montecarlo.
    - cron: "30 9 * * 1"
  workflow_dispatch: {}   # botón para correrlo a mano cuando quieras

permissions:
  contents: write   # necesario para crear Releases y commitear el feed

jobs:
  generar-episodio:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Dependencias
        run: pip install -r requirements.txt

      - name: Restaurar cookies de sesión (opcional)
        if: env.COOKIES != ''
        env:
          COOKIES: ${{ secrets.EL_PAIS_COOKIES }}
        run: printf '%s' "$COOKIES" > cookies.txt

      - name: Generar guion y MP3
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          FECHA=$(date +%F)
          ARGS=""
          [ -f cookies.txt ] && ARGS="--cookies cookies.txt"
          python3 podcast_eym.py $ARGS --salida "episodio-eym-$FECHA.mp3"
          echo "FECHA=$FECHA" >> "$GITHUB_ENV"

      - name: Subir MP3 a un Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="eym-$FECHA"
          gh release create "$TAG" \
            --title "Economía y Mercado $FECHA" \
            --notes "Episodio generado automáticamente." \
            "episodio-eym-$FECHA.mp3" "guion-eym-$FECHA.txt" || \
          gh release upload "$TAG" "episodio-eym-$FECHA.mp3" "guion-eym-$FECHA.txt" --clobber
          URL="https://github.com/${{ github.repository }}/releases/download/$TAG/episodio-eym-$FECHA.mp3"
          echo "MP3_URL=$URL" >> "$GITHUB_ENV"

      - name: Actualizar RSS
        run: |
          BYTES=$(stat -c%s "episodio-eym-$FECHA.mp3")
          TITULO="Economía y Mercado — $FECHA"
          python3 generar_rss.py --titulo "$TITULO" --url "$MP3_URL" --bytes "$BYTES"

      - name: Commitear feed y estado
        run: |
          git config user.name "podcast-bot"
          git config user.email "actions@github.com"
          git add episodios.json docs/feed.xml
          git commit -m "Episodio $FECHA" || echo "Sin cambios"
          git push
